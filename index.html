<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Arthur — aether_dz</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css?family=Righteous|Ubuntu+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      color: #fff;
      height: 100vh;
      width: 100vw;
    }
    canvas { display: block; vertical-align: bottom; }
    #particles-js {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      width: 90%;
      max-width: 1000px;
    }

    .image {
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.08);
      max-width: 250px;
      width: 100%;
      height: auto;
    }

    .header1 {
      font-family: 'Righteous', cursive;
      font-size: 5.5vw;
      color: #fff;
      margin-bottom: 0;
      line-height: 1.1;
    }
    .header2 {
      font-family: 'Ubuntu Mono', monospace;
      font-size: 1.3vw;
      color: rgba(255,255,255,0.55);
      margin-bottom: 0.6rem;
    }
    .header3 {
      font-family: 'Ubuntu Mono', monospace;
      font-size: 2vw;
      color: rgba(255,255,255,0.3);
      margin-bottom: 0.2rem;
    }

    .link1 {
      font-family: 'Ubuntu Mono', monospace;
      font-size: 2.5vw;
      color: rgba(255,255,255,0.65);
      margin: 0 4px;
      transition: all 0.3s ease;
      text-decoration: none !important;
      display: inline-block;
    }
    .link1:hover {
      color: #00ffaa;
      transform: translateY(-4px) scale(1.05);
    }

    .email-tooltip {
      position: fixed;
      right: 0;
      bottom: 0;
      margin: 0;
      z-index: 10000;
      font-family: "Ubuntu Mono", monospace;
      background: #111;
      color: rgba(255,255,255,0.35);
      padding: 8px 14px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.85rem;
    }
    .email-tooltip:hover {
      color: #00ffaa;
      border-color: rgba(0,255,170,0.25);
      background: #1a1a1a;
    }
    .email-tooltip summary {
      list-style: none;
      outline: none;
      cursor: pointer;
    }
    .email-tooltip summary::-webkit-details-marker { display: none; }

    @media screen and (max-width: 785px) {
      .header1 { font-size: 8vw; }
      .link1 { font-size: 4vw; }
      .image { max-width: 180px; }
    }
    @media screen and (max-width: 765px) {
      body { text-align: center; overflow-y: auto; }
      .center { position: relative; top: auto; left: auto; transform: none; padding: 50px 20px; }
      .header1 { font-size: 10vw; }
      .header2 { font-size: 3vw; }
      .header3 { font-size: 4vw; }
      .link1 { font-size: 6vw; }
      .image { max-width: 160px; margin-bottom: 10px; }
    }
    @media screen and (min-width: 1390px) {
      .header2 { font-size: 1vw; }
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <div class="container">
    <div class="center">
      <div class="row d-flex flex-wrap align-items-center">
        <div class="col-md-5 text-center">
          <img class="image img-fluid" src="assets/profile.jpg" alt="Arthur">
        </div>
        <div class="col-md">
          <p class="header1">Arthur</p>
          <p class="header3">aether_dz</p>
          <p class="header2">Security Researcher / Software Engineer</p>
          <a class="link1" href="https://github.com/aether-dz" target="_blank" rel="noopener"><i class="fab fa-github"></i></a>
          <a class="link1" href="https://linkedin.com/in/aether-dz" target="_blank" rel="noopener"><i class="fab fa-linkedin"></i></a>
          <a class="link1" href="https://instagram.com/zaikabdou" target="_blank" rel="noopener"><i class="fab fa-instagram"></i></a>
          <a class="link1" href="https://x.com/aether_dz" target="_blank" rel="noopener"><i class="fa-brands fa-x-twitter"></i></a>
          <a class="link1" href="https://t.me/pp9ps" target="_blank" rel="noopener"><i class="fab fa-telegram-plane"></i></a>
        </div>
      </div>
    </div>
  </div>

  <details class="email-tooltip">
    <summary>abdozaik620@gmail.com</summary>
  </details>

  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    particlesJS('particles-js', {
      particles: {
        number: { value: 100, density: { enable: true, value_area: 800 } },
        color: { value: "#ffffff" },
        shape: { type: "circle" },
        opacity: { value: 0.5, random: true },
        size: { value: 3, random: true },
        line_linked: { enable: true, distance: 160, color: "#ffffff", opacity: 0.25, width: 1.5 },
        move: { enable: true, speed: 2.5, direction: "none", random: true, straight: false, out_mode: "out" }
      },
      interactivity: {
        detect_on: "canvas",
        events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: false }, resize: true },
        modes: { grab: { distance: 220, line_linked: { opacity: 0.7 } } }
      },
      retina_detect: true
    });
  </script>
</body>
</html>
