<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Arthur — aether_dz</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css?family=Righteous|Ubuntu+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  <style>
    body {
      background: #000;
      margin: 0;
      padding: 0;
      overflow: hidden;
      color: #fff;
    }
    canvas {
      display: block;
      vertical-align: bottom;
    }
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      width: 90%;
      max-width: 1100px;
    }

    .image {
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.08);
      max-width: 100%;
      height: auto;
      transition: transform 0.3s ease;
    }
    .image:hover {
      transform: scale(1.03);
    }

    .header1 {
      font-family: 'Righteous', cursive;
      font-size: 6vw;
      color: #fff;
      margin-bottom: 0;
      line-height: 1.1;
    }
    .header2 {
      font-family: 'Ubuntu Mono', monospace;
      font-size: 1.4vw;
      color: rgba(255,255,255,0.6);
      margin-bottom: 0.5rem;
    }
    .header3 {
      font-family: 'Ubuntu Mono', monospace;
      font-size: 2.2vw;
      color: rgba(255,255,255,0.35);
      margin-bottom: 0.3rem;
    }

    .link1 {
      font-family: 'Ubuntu Mono', monospace;
      font-size: 2.8vw;
      color: rgba(255,255,255,0.7);
      margin: 0 5px;
      transition: 0.3s;
      text-decoration: none !important;
      display: inline-block;
    }
    .link1:hover {
      color: #00ffaa;
      transform: translateY(-3px);
      text-shadow: 0 0 20px rgba(0,255,170,0.3);
    }

    .email-tooltip {
      position: fixed;
      right: 0;
      bottom: 0;
      margin: 0;
      z-index: 10000;
      font-family: "Ubuntu Mono", monospace;
      background: #111;
      color: rgba(255,255,255,0.4);
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      cursor: pointer;
      transition: 0.3s;
    }
    .email-tooltip:hover {
      color: #00ffaa;
      border-color: rgba(0,255,170,0.3);
    }
    .email-tooltip summary {
      list-style: none;
      outline: none;
      cursor: pointer;
    }
    .email-tooltip summary::-webkit-details-marker {
      display: none;
    }

    .card-inner {
      transition: transform 0.08s ease-out;
      transform-style: preserve-3d;
    }

    @media screen and (max-width: 785px) {
      .header1 { font-size: 8vw; }
      .link1 { font-size: 4vw; }
    }
    @media screen and (max-width: 765px) {
      body { text-align: center; overflow-y: auto; }
      .center { position: relative; top: auto; left: auto; transform: none; padding: 40px 20px; }
      .header1 { font-size: 9vw; }
      .header2 { font-size: 2.5vw; }
      .link1 { font-size: 5vw; }
      .image { max-width: 200px; }
    }
    @media screen and (min-width: 1390px) {
      .header2 { font-size: 1.1vw; }
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <div class="container">
    <div class="center">
      <div class="card-inner" id="card">
        <div class="row d-flex flex-wrap align-items-center">
          <div class="col-md-5 text-center">
            <img class="image img-fluid" src="assets/profile.jpg" alt="Arthur">
          </div>
          <div class="col-md">
            <p class="header1">Arthur</p>
            <p class="header3">aether_dz</p>
            <p class="header2">Security Researcher / Software Engineer</p>
            <a class="link1" href="https://github.com/aether-dz" target="_blank" rel="noopener"><i class="fab fa-github"></i></a>
            <a class="link1" href="https://linkedin.com/in/aether-dz" target="_blank" rel="noopener"><i class="fab fa-linkedin"></i></a>
            <a class="link1" href="https://instagram.com/zaikabdou" target="_blank" rel="noopener"><i class="fab fa-instagram"></i></a>
            <a class="link1" href="https://x.com/aether_dz" target="_blank" rel="noopener"><i class="fa-brands fa-x-twitter"></i></a>
            <a class="link1" href="https://t.me/pp9ps" target="_blank" rel="noopener"><i class="fab fa-telegram-plane"></i></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <details class="email-tooltip">
    <summary>abdozaik620@gmail.com</summary>
  </details>

  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    particlesJS('particles-js', {
      particles: {
        number: { value: 80, density: { enable: true, value_area: 800 } },
        color: { value: "#ffffff" },
        shape: { type: "circle", stroke: { width: 0, color: "#ffffff" } },
        opacity: { value: 0.4, random: false },
        size: { value: 4, random: true },
        line_linked: { enable: true, distance: 150, color: "#ffffff", opacity: 0.2, width: 2 },
        move: { enable: true, speed: 2, direction: "none", random: false, straight: false, out_mode: "out" }
      },
      interactivity: {
        detect_on: "canvas",
        events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: false }, resize: true },
        modes: { grab: { distance: 200, line_linked: { opacity: 0.6 } } }
      },
      retina_detect: true
    });

    // Mouse 3D tilt
    (function() {
      const card = document.getElementById('card');
      if (!card) return;
      document.addEventListener('mousemove', function(e) {
        const x = (e.clientX / window.innerWidth - 0.5) * 2;
        const y = (e.clientY / window.innerHeight - 0.5) * 2;
        card.style.transform = 'rotateY(' + (x * 4) + 'deg) rotateX(' + (-y * 4) + 'deg)';
      });
    })();
  </script>
</body>
</html>
